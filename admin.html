<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - The Economic Forum</title>
    <link rel="stylesheet" href="styleFolder/style.css">
    <link rel="stylesheet" href="styleFolder/admin.css">
    <script src="scriptFolder/footer.js" defer></script>
    <script type="module" src="scriptFolder/sidebar.js" defer></script>
</head>
<body>
    <tef-sidebar active-page="admin"></tef-sidebar>

    <main class="main">
        <section class="admin-container">
            <header class="admin-header">
                <h1><svg id = "shield-icon" fill="#000000" width="800px" height="800px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.63,3.65a1,1,0,0,0-.84-.2,8,8,0,0,1-6.22-1.27,1,1,0,0,0-1.14,0A8,8,0,0,1,5.21,3.45a1,1,0,0,0-.84.2A1,1,0,0,0,4,4.43v7.45a9,9,0,0,0,3.77,7.33l3.65,2.6a1,1,0,0,0,1.16,0l3.65-2.6A9,9,0,0,0,20,11.88V4.43A1,1,0,0,0,19.63,3.65ZM18,11.88a7,7,0,0,1-2.93,5.7L12,19.77,8.93,17.58A7,7,0,0,1,6,11.88V5.58a10,10,0,0,0,6-1.39,10,10,0,0,0,6,1.39Z"/></svg> Exec Board Panel</h1>
            </header>

            <div class="admin-tabs">
                <button class="tab-btn active" onclick="switchTab('approvals')">
                    👤 APPROVALS (<span id="count-pending">0</span>)
                </button>
                <button class="tab-btn" onclick="switchTab('members')">
                    👥 MEMBERS
                </button>
                <button class="tab-btn" onclick="switchTab('moderation')">
                    📑 MODERATION
                </button>
            </div>

            <div id="tab-content" class="tab-pane">
                <div class="loading-state">Loading records...</div>
            </div>
        </section>
    </main>

    <script type="module" src="scriptFolder/admin.js"></script>
</body>
</html>
