                </svg>
            </div>
            <h2>Welcome to The Economic Forum</h2>
            <p class="auth-subtitle">Sign in to continue</p>

            <form id="signInForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="signInEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signInPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-submit-btn">Sign in</button>
            </form>

            <div class="auth-footer">
                <a href="#" class="auth-link">Forgot password?</a>
                <span>Need an account? <a href="#" class="auth-link bold" onclick="toggleAuthView()">Sign up</a></span>
            </div>
        </div>

        <div id="signUpView" class="auth-card hidden">
            <a href="#" class="back-link" onclick="toggleAuthView()">← Back to sign in</a>
            <h2>Create your account</h2>

            <form id="signUpForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="signUpEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signUpPassword" placeholder="Min. 8 characters" required minlength="8">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signUpConfirm" placeholder="Re-enter password" required>
                </div>
                <button type="submit" class="auth-submit-btn">Create account</button>
            </form>
        </div>

    </div>

    <script>
        // Simple UI toggle for the forms
        function toggleAuthView() {
            document.getElementById('signInView').classList.toggle('hidden');
            document.getElementById('signUpView').classList.toggle('hidden');
        }
    </script>
    <script type="module" src="scriptFolder/auth.js"></script>
</body>
</html>
