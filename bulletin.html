<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Bulletin — The Economic Forum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Pro:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styleFolder/style.css">
  <link rel="stylesheet" href="styleFolder/the-floor.css">
  <script src="scriptFolder/footer.js" defer></script>
  <script type="module" src="scriptFolder/sidebar.js" defer></script>
  <script type="module" src="scriptFolder/bulletin.js" defer></script>
  <style>
    /* ── BULLETIN-SPECIFIC STYLES ── */

    .bulletin-card {
      background: var(--gold-bg);
      border: 1px solid #e8ddb8;
      border-radius: 2px;
      padding: 22px 24px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .bulletin-card:hover {
      border-color: var(--gold);
      box-shadow: 0 2px 12px rgba(201,168,76,0.12);
    }

    /* Pinned label at the top of each card */
    .bc-pin-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .bc-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .bc-body {
      font-size: 15px;
      color: #4b5563;
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .bc-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .bc-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .bc-goto {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* Admin unpin row */
    .bc-admin-row {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e8ddb8;
      display: flex;
      justify-content: flex-end;
    }

    .bc-unpin-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid #fca5a5;
      color: #dc2626;
      font-family: 'Crimson Pro', serif;
      font-size: 13px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .bc-unpin-btn:hover {
      background: #fff1f2;
    }

    /* Empty state overrides */
    .empty-state .empty-italic {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 17px;
      color: #9ca3af;
      margin-bottom: 6px;
    }
    .empty-state .empty-sub {
      font-size: 14px;
      color: #b0b7c3;
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<tef-sidebar active-page="bulletin"></tef-sidebar>

<!-- MAIN -->
<main class="main">
  <div class="view active" id="viewBulletin">

    <div class="page-header">
      <h1>The Bulletin</h1>
      <p class="subtitle">Important pinned content from across the forum. Curated by the Exec Board.</p>
      <div class="header-rule"></div>
    </div>

    <div class="content">
      <div class="posts-list" id="bulletinList"></div>
    </div>

    <tef-footer></tef-footer>
  </div>
</main>

</body>
</html>
