<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Floor — The Economic Forum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Pro:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styleFolder/style.css">
  <link rel="stylesheet" href="styleFolder/the-floor.css">
  <script src="scriptFolder/footer.js" defer></script>
  <script type="module" src="scriptFolder/sidebar.js" defer></script>
  <script type="module" src="scriptFolder/the-floor.js"></script>
</head>
<body>

<!-- SIDEBAR -->
<tef-sidebar active-page="floor"></tef-sidebar>

<!-- MAIN -->
<main class="main">

  <!-- ── LIST VIEW ── -->
  <div class="view active" id="viewList">
    <div class="page-header">
      <h1>The Floor</h1>
      <p class="subtitle">Open discussion, debates, and real-time economic discourse. Speak your mind.</p>
      <div class="header-rule"></div>
    </div>

    <div class="content">
      <div class="action-bar">
        <button class="btn-primary" onclick="window.openModal('discussModal')">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Start Discussion
        </button>
        <button class="btn-outline" onclick="window.openModal('pollModal')">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          New Poll
        </button>
      </div>

      <div class="tabs">
        <button class="tab active" id="tabDiscussions" onclick="window.switchTab('discussions')">DISCUSSIONS</button>
        <button class="tab" id="tabPolls" onclick="window.switchTab('polls')">POLLS</button>
      </div>

      <div class="filter-bar" id="filterBar">
        <span class="filter-label">FILTER:</span>
        <button class="filter-tag active" onclick="window.filterByTag(this,'all')">All</button>
        <button class="filter-tag" onclick="window.filterByTag(this,'macroeconomics')">macroeconomics</button>
        <button class="filter-tag" onclick="window.filterByTag(this,'fed-policy')">fed-policy</button>
        <button class="filter-tag" onclick="window.filterByTag(this,'trade')">trade</button>
        <button class="filter-tag" onclick="window.filterByTag(this,'inflation')">inflation</button>
        <button class="filter-tag" onclick="window.filterByTag(this,'debate')">debate</button>
      </div>

      <div id="panelDiscussions">
        <div class="posts-list" id="discussionsList"></div>
      </div>

      <div id="panelPolls" style="display:none">
        <div class="posts-list" id="pollsList"></div>
      </div>
    </div>

    
  </div>
  

  <!-- ── SINGLE DISCUSSION VIEW ── -->
  <div class="view" id="viewDiscussion">
    <div class="disc-topbar">
      <button class="back-btn" onclick="window.showList()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to The Floor
      </button>
      <div class="topbar-actions" id="discTopActions"></div>
    </div>
    <div class="discussion-body" id="discussionBody"></div>
  </div>

  <tef-footer></tef-footer>
NOW
</main>

<!-- ── CONFIRM DELETE ── -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal confirm-modal">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Delete this discussion?</div>
    <div class="confirm-desc">This will permanently remove the discussion and all its comments. This cannot be undone.</div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="window.closeModal('confirmModal')">Cancel</button>
      <button class="btn-conf-del" onclick="window.deleteDiscussion()">Yes, Delete</button>
    </div>
  </div>
</div>

<!-- ── START DISCUSSION MODAL ── -->
<div class="modal-overlay" id="discussModal">
  <div class="modal">
    <button class="modal-close" onclick="window.closeModal('discussModal')">×</button>
    <div class="modal-title">Start Discussion</div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="discTitle" type="text" placeholder="Enter a compelling title...">
    </div>
    <div class="form-group">
      <label class="form-label">Content</label>
      <textarea class="form-textarea" id="discContent" placeholder="Write your post... Use @username to mention someone"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Tags (comma separated)</label>
      <input class="form-input" id="discTags" type="text" placeholder="macroeconomics, fed-policy, debate...">
    </div>
    <div class="form-group">
      <label class="form-label">Attachments</label>
      <div class="attach-area" onclick="document.getElementById('fileInput').click()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
        Attach files or images
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="window.previewFile(this)">
      <div class="attach-preview" id="attachPreview"></div>
    </div>
    <button id="mainSubmitBtn" class="btn-post-cmt" onclick="window.handleMainButtonClick()">Publish Discussion</button>
  </div>
</div>


<!-- ── NEW POLL MODAL ── -->
<div class="modal-overlay" id="pollModal">
  <div class="modal modal-sm">
    <button class="modal-close" onclick="window.closeModal('pollModal')">×</button>
    <div class="modal-title">Create a Poll</div>
    <div class="form-group">
      <label class="form-label">Question</label>
      <input class="form-input" id="pollQuestion" type="text" placeholder="What should we debate?">
    </div>
    <div class="form-group">
      <label class="form-label">Options</label>
      <div class="poll-option-inputs" id="pollOptionInputs">
        <div class="poll-opt-row">
          <input class="form-input" type="text" placeholder="Option 1">
          <button class="remove-opt" onclick="window.removeOpt(this)" title="Remove">×</button>
        </div>
        <div class="poll-opt-row">
          <input class="form-input" type="text" placeholder="Option 2">
          <button class="remove-opt" onclick="window.removeOpt(this)" title="Remove">×</button>
        </div>
      </div>
      <button class="add-option-btn" onclick="window.addPollOption()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Option
      </button>
    </div>
    <button class="btn-full" onclick="window.publishPoll()">Create Poll</button>
  </div>
</div>


</body>
</html>
