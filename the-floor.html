<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Floor — The Economic Forum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Pro:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel = "stylesheet" href = "styleFolder/style.css">
<link rel = "stylesheet" href = "styleFolder/the-floor.css">
<script src="scriptFolder/footer.js" defer></script>
<script src="scriptFolder/sidebar.js" defer></script>
</head>
<body>

<!-- SIDEBAR -->
<tef-sidebar active-page="floor"></tef-sidebar>

<!-- MAIN -->
<main class="main">
  <div class="page-header">
    <h1>The Floor</h1>
    <p class="subtitle">Open discussion, debates, and real-time economic discourse. Speak your mind.</p>
    <div class="header-rule"></div>
  </div>

  <div class="content">
    <!-- ACTION BAR -->
    <div class="action-bar">
      <button class="btn-primary" onclick="openModal('discussModal')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Start Discussion
      </button>
      <button class="btn-outline" onclick="openModal('pollModal')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        New Poll
      </button>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" id="tabDiscussions" onclick="switchTab('discussions')">DISCUSSIONS</button>
      <button class="tab" id="tabPolls" onclick="switchTab('polls')">POLLS</button>
    </div>

    <!-- FILTER TAGS (discussions only) -->
    <div class="filter-bar" id="filterBar">
      <span class="filter-label">FILTER:</span>
      <button class="filter-tag active" onclick="filterByTag(this,'all')">All</button>
      <button class="filter-tag" onclick="filterByTag(this,'macroeconomics')">macroeconomics</button>
      <button class="filter-tag" onclick="filterByTag(this,'fed-policy')">fed-policy</button>
      <button class="filter-tag" onclick="filterByTag(this,'trade')">trade</button>
      <button class="filter-tag" onclick="filterByTag(this,'inflation')">inflation</button>
      <button class="filter-tag" onclick="filterByTag(this,'debate')">debate</button>
    </div>

    <!-- DISCUSSIONS PANEL -->
    <div id="panelDiscussions">
      <div class="posts-list" id="discussionsList"></div>
    </div>

    <!-- POLLS PANEL (hidden initially) -->
    <div id="panelPolls" style="display:none">
      <div class="posts-list" id="pollsList"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <tef-footer></tef-footer>
</main>

<!-- ── START DISCUSSION MODAL ── -->
<div class="modal-overlay" id="discussModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('discussModal')">×</button>
    <div class="modal-title">Start Discussion</div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="discTitle" type="text" placeholder="Enter a compelling title...">
    </div>
    <div class="form-group">
      <label class="form-label">Content</label>
      <textarea class="form-textarea" id="discContent" placeholder="Write your post... Use @username to mention someone"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Tags (comma separated)</label>
      <input class="form-input" id="discTags" type="text" placeholder="macroeconomics, fed-policy, debate...">
    </div>
    <div class="form-group">
      <label class="form-label">Attachments</label>
      <div class="attach-area" onclick="document.getElementById('fileInput').click()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        Attach files or images
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="previewFile(this)">
      <div class="attach-preview" id="attachPreview"></div>
    </div>
    <button class="btn-full" onclick="publishDiscussion()">Publish Post</button>
  </div>
</div>

<!-- ── NEW POLL MODAL ── -->
<div class="modal-overlay" id="pollModal">
  <div class="modal modal-sm">
    <button class="modal-close" onclick="closeModal('pollModal')">×</button>
    <div class="modal-title">Create a Poll</div>
    <div class="form-group">
      <label class="form-label">Question</label>
      <input class="form-input" id="pollQuestion" type="text" placeholder="What should we debate?">
    </div>
    <div class="form-group">
      <label class="form-label">Options</label>
      <div class="poll-option-inputs" id="pollOptionInputs">
        <div class="poll-opt-row"><input class="form-input" type="text" placeholder="Option 1"><button class="remove-opt" onclick="removeOpt(this)" title="Remove">×</button></div>
        <div class="poll-opt-row"><input class="form-input" type="text" placeholder="Option 2"><button class="remove-opt" onclick="removeOpt(this)" title="Remove">×</button></div>
      </div>
      <button class="add-option-btn" onclick="addPollOption()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Option
      </button>
    </div>
    <button class="btn-full" onclick="publishPoll()">Create Poll</button>
  </div>
</div>

<script src="scriptFolder/the-floor.js"></script>
</body>
</html>
